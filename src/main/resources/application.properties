spring.application.name=agro-erp-backend
server.port=${PORT:8080}

# NO context-path here - we handle /api in each controller

# Database
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/agro_erp_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
app.jwt.secret=${JWT_SECRET:5KEUoseiz9TUTi2T5+ZRSJZ0p5GtYUxGfJW8/uuSDKc=}
app.jwt.expiration-ms=86400000

# Logging
logging.level.com.agroerp=INFO